worker_processes auto;

# nginx strips env vars from workers by default; these pass them through to Lua
env FHIR_USERNAME;
env FHIR_PASSWORD;

events {
    worker_connections 1024;
}

http {
    server {
        listen 8080;

        location / {
            access_by_lua_block {
                local valid_user = os.getenv("FHIR_USERNAME")
                local valid_pass = os.getenv("FHIR_PASSWORD")

                local username, password

                -- 1. Query params: ?username=xxx&password=xxx
                local args = ngx.req.get_uri_args()
                username = args["username"]
                password = args["password"]

                -- 2. Fall back to HTTP Basic Auth header
                if not username or not password then
                    local auth = ngx.req.get_headers()["Authorization"]
                    if auth then
                        local encoded = auth:match("^Basic%s+(.+)$")
                        if encoded then
                            local decoded = ngx.decode_base64(encoded)
                            if decoded then
                                username, password = decoded:match("^([^:]+):(.+)$")
                            end
                        end
                    end
                end

                if username ~= valid_user or password ~= valid_pass then
                    -- WWW-Authenticate triggers the browser's native login dialog
                    ngx.header["WWW-Authenticate"] = 'Basic realm="HAPI FHIR"'
                    ngx.status = ngx.HTTP_UNAUTHORIZED
                    return ngx.exit(ngx.HTTP_UNAUTHORIZED)
                end
            }

            proxy_pass       http://fhir:8080;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
